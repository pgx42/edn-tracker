<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
.badge { display:inline-flex; align-items:center; gap:4px; height:20px; padding:0 8px; font-size:11px; font-weight:500; border-radius:var(--radius-pill); border:1px solid; line-height:1; }
.dot { width:6px; height:6px; border-radius:50%; }
.tag { display:inline-flex; align-items:center; height:22px; padding:0 8px; border-radius:var(--radius-xs); font-size:12px; background:var(--bg-sunken); border:1px solid var(--border-subtle); color:var(--fg-2); font-family:var(--font-ui); }
</style>
</head>
<body class="preview-card">
  <div class="row" style="gap:8px;flex-wrap:wrap">
    <span class="badge" style="background:var(--success-bg);color:var(--success-fg);border-color:var(--success-border)"><span class="dot" style="background:var(--success-fg)"></span>À jour</span>
    <span class="badge" style="background:var(--warning-bg);color:var(--warning-fg);border-color:var(--warning-border)"><span class="dot" style="background:var(--warning-fg)"></span>5 en retard</span>
    <span class="badge" style="background:var(--danger-bg);color:var(--danger-fg);border-color:var(--danger-border)"><span class="dot" style="background:var(--danger-fg)"></span>42 erreurs</span>
    <span class="badge" style="background:var(--info-bg);color:var(--info-fg);border-color:var(--info-border)"><span class="dot" style="background:var(--info-fg)"></span>Nouveau</span>
    <span class="badge" style="background:var(--bg-sunken);color:var(--fg-2);border-color:var(--border-subtle)">Brouillon</span>
  </div>
  <div class="row" style="gap:6px;flex-wrap:wrap">
    <span class="tag">#cardiologie</span>
    <span class="tag">#item-334</span>
    <span class="tag">#urgence</span>
    <span class="tag" style="color:var(--accent-fg);background:var(--accent-bg);border-color:var(--accent-border)">#difficile</span>
    <span class="tag">#révision-J3</span>
  </div>
</body></html>
