<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body class="preview-card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div style="border:1px solid var(--success-border);background:var(--success-bg);border-radius:var(--radius-md);padding:12px 14px">
      <div style="font-size:11px;font-weight:600;color:var(--success-fg);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">✓ ÉCRIT EDN</div>
      <div style="font-size:13px;color:var(--fg-1);font-weight:500">Reprends là où tu t'es arrêté.</div>
      <div style="font-size:12px;color:var(--fg-2);margin-top:4px">42 cartes en retard. 12 minutes pour rattraper.</div>
    </div>
    <div style="border:1px solid var(--danger-border);background:var(--danger-bg);border-radius:var(--radius-md);padding:12px 14px">
      <div style="font-size:11px;font-weight:600;color:var(--danger-fg);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">✗ ÉVITE</div>
      <div style="font-size:13px;color:var(--fg-1);font-weight:500">Salut champion ! 🚀</div>
      <div style="font-size:12px;color:var(--fg-2);margin-top:4px">Prêt(e) pour une session de fou ?? 💪</div>
    </div>
    <div style="border:1px solid var(--success-border);background:var(--success-bg);border-radius:var(--radius-md);padding:12px 14px">
      <div style="font-size:11px;font-weight:600;color:var(--success-fg);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">✓</div>
      <div style="font-size:13px;color:var(--fg-1)">Supprimer 12 annotations. Irréversible.</div>
    </div>
    <div style="border:1px solid var(--danger-border);background:var(--danger-bg);border-radius:var(--radius-md);padding:12px 14px">
      <div style="font-size:11px;font-weight:600;color:var(--danger-fg);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">✗</div>
      <div style="font-size:13px;color:var(--fg-1)">Êtes-vous sûr de vouloir continuer ?</div>
    </div>
  </div>
</body></html>
