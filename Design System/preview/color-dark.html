<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body class="preview-card" data-theme="dark" style="background:var(--bg-canvas);color:var(--fg-1)">
  <div class="row">
    <div class="swatch"><div class="swatch-chip" style="background:var(--bg-canvas);border-color:var(--border-subtle)"></div><div class="swatch-name" style="color:var(--fg-1)">canvas</div><div class="swatch-val">#0a0a0b</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--bg-surface);border-color:var(--border-subtle)"></div><div class="swatch-name" style="color:var(--fg-1)">surface</div><div class="swatch-val">#131316</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--bg-sunken);border-color:var(--border-subtle)"></div><div class="swatch-name" style="color:var(--fg-1)">sunken</div><div class="swatch-val">#08080a</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--accent);border-color:var(--border-subtle)"></div><div class="swatch-name" style="color:var(--fg-1)">accent</div><div class="swatch-val">#60a5fa</div></div>
  </div>
  <div class="row">
    <div class="swatch"><div class="swatch-chip" style="background:var(--fg-1);border-color:var(--border-subtle)"></div><div class="swatch-name" style="color:var(--fg-1)">fg-1</div><div class="swatch-val">#f4f4f5</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--fg-2);border-color:var(--border-subtle)"></div><div class="swatch-name" style="color:var(--fg-1)">fg-2</div><div class="swatch-val">#c4c4c8</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--fg-3);border-color:var(--border-subtle)"></div><div class="swatch-name" style="color:var(--fg-1)">fg-3</div><div class="swatch-val">#8b8b92</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--border-default);border-color:var(--border-default)"></div><div class="swatch-name" style="color:var(--fg-1)">border</div><div class="swatch-val">#34343b</div></div>
  </div>
</body></html>
