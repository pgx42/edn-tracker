<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
.menu { width:240px; background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:var(--radius-md); box-shadow:var(--shadow-md); padding:4px; }
.mi { display:flex; align-items:center; gap:8px; height:28px; padding:0 8px; border-radius:var(--radius-xs); font-size:13px; color:var(--fg-1); cursor:pointer; }
.mi:hover { background:var(--bg-hover); }
.mi.active { background:var(--bg-selected); color:var(--accent-fg); }
.mi-shortcut { margin-left:auto; font-size:11px; color:var(--fg-3); font-family:var(--font-mono); }
.divider { height:1px; background:var(--border-subtle); margin:4px 0; }
.icon { width:14px; height:14px; }
</style>
</head>
<body class="preview-card">
  <div class="row" style="gap:14px;align-items:flex-start">
    <div class="menu">
      <div class="mi"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5v14"/></svg>Nouvelle carte<span class="mi-shortcut">⌘N</span></div>
      <div class="mi active"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>Rechercher<span class="mi-shortcut">⌘K</span></div>
      <div class="mi"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M2 12h20"/></svg>Mindmap<span class="mi-shortcut">⌘M</span></div>
      <div class="divider"></div>
      <div class="mi"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>Importer un PDF</div>
      <div class="mi" style="color:var(--danger-fg)"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>Supprimer</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div style="font-size:12px;color:var(--fg-3)">Menu contextuel · 240 width · radius-md · shadow-md</div>
      <div style="background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:10px;display:flex;align-items:center;gap:8px">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--fg-3)"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <span style="font-size:13px;color:var(--fg-3);flex:1">Rechercher dans toute la base...</span>
        <kbd>⌘</kbd><kbd>K</kbd>
      </div>
    </div>
  </div>
</body></html>
