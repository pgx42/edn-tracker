<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
.tab { display:inline-flex; align-items:center; height:32px; padding:0 12px; font-size:13px; color:var(--fg-2); border-bottom:2px solid transparent; cursor:pointer; }
.tab.active { color:var(--fg-1); border-bottom-color:var(--accent); font-weight:500; }
.tab:hover:not(.active) { color:var(--fg-1); }

.seg { display:inline-flex; padding:3px; background:var(--bg-sunken); border-radius:var(--radius-sm); border:1px solid var(--border-subtle); }
.seg-item { padding:5px 12px; font-size:12px; font-weight:500; color:var(--fg-2); border-radius:var(--radius-xs); cursor:pointer; }
.seg-item.active { background:var(--bg-surface); color:var(--fg-1); box-shadow:var(--shadow-sm); }

.toggle { width:32px; height:18px; background:var(--border-default); border-radius:999px; position:relative; cursor:pointer; transition:background var(--dur-sm) var(--ease-out); }
.toggle::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; background:#fff; border-radius:50%; transition:transform var(--dur-sm) var(--ease-out); box-shadow:var(--shadow-sm); }
.toggle.on { background:var(--accent); }
.toggle.on::after { transform:translateX(14px); }
</style>
</head>
<body class="preview-card">
  <div style="display:flex;gap:0;border-bottom:1px solid var(--border-subtle);align-items:flex-end">
    <div class="tab active">Cartes</div>
    <div class="tab">PDF</div>
    <div class="tab">Liens</div>
    <div class="tab">Erreurs <span style="margin-left:6px;background:var(--danger-bg);color:var(--danger-fg);font-size:10px;padding:1px 6px;border-radius:999px">3</span></div>
  </div>
  <div class="row" style="gap:14px;align-items:center">
    <div class="seg">
      <div class="seg-item active">Jour</div>
      <div class="seg-item">Semaine</div>
      <div class="seg-item">Mois</div>
    </div>
    <div style="flex:1"></div>
    <div class="row" style="gap:8px;align-items:center"><div class="toggle on"></div><span style="font-size:13px">Mode sombre</span></div>
    <div class="row" style="gap:8px;align-items:center"><div class="toggle"></div><span style="font-size:13px">Auto-play</span></div>
  </div>
</body></html>
