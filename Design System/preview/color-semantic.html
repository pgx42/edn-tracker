<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body class="preview-card">
  <div class="row" style="gap:14px">
    <div style="flex:1;border-radius:var(--radius-md);border:1px solid var(--success-border);background:var(--success-bg);color:var(--success-fg);padding:14px;display:flex;flex-direction:column;gap:4px">
      <div style="font-weight:600;font-size:13px">Réussi</div>
      <div style="font-size:12px;opacity:.85">success-fg / success-bg</div>
    </div>
    <div style="flex:1;border-radius:var(--radius-md);border:1px solid var(--warning-border);background:var(--warning-bg);color:var(--warning-fg);padding:14px;display:flex;flex-direction:column;gap:4px">
      <div style="font-weight:600;font-size:13px">Attention</div>
      <div style="font-size:12px;opacity:.85">warning-fg / warning-bg</div>
    </div>
    <div style="flex:1;border-radius:var(--radius-md);border:1px solid var(--danger-border);background:var(--danger-bg);color:var(--danger-fg);padding:14px;display:flex;flex-direction:column;gap:4px">
      <div style="font-weight:600;font-size:13px">Erreur</div>
      <div style="font-size:12px;opacity:.85">danger-fg / danger-bg</div>
    </div>
    <div style="flex:1;border-radius:var(--radius-md);border:1px solid var(--info-border);background:var(--info-bg);color:var(--info-fg);padding:14px;display:flex;flex-direction:column;gap:4px">
      <div style="font-weight:600;font-size:13px">Info</div>
      <div style="font-size:12px;opacity:.85">info-fg / info-bg</div>
    </div>
  </div>
  <div class="row" style="gap:8px">
    <span style="background:var(--anki-again);color:#fff;padding:4px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600">Again</span>
    <span style="background:var(--anki-hard);color:#fff;padding:4px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600">Hard</span>
    <span style="background:var(--anki-good);color:#fff;padding:4px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600">Good</span>
    <span style="background:var(--anki-easy);color:#fff;padding:4px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600">Easy</span>
    <span class="meta" style="margin-left:auto">Anki rating tokens</span>
  </div>
</body></html>
