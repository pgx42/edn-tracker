<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
.field { display:flex; flex-direction:column; gap:6px; flex:1; }
.field-label { font-size:12px; font-weight:500; color:var(--fg-2); }
.input { height:32px; padding:0 10px; border-radius:var(--radius-sm); border:1px solid var(--border-default); background:var(--bg-surface); color:var(--fg-1); font-family:var(--font-ui); font-size:13px; }
.input:focus { outline:2px solid var(--border-focus); outline-offset:1px; border-color:var(--border-focus); }
.input.error { border-color:var(--danger-fg); }
.helper { font-size:11px; color:var(--fg-3); }
.helper.error { color:var(--danger-fg); }
</style>
</head>
<body class="preview-card">
  <div class="row" style="gap:14px;align-items:flex-start">
    <div class="field">
      <div class="field-label">Email</div>
      <input class="input" placeholder="tu@medecine.fr">
      <div class="helper">On ne te spamme pas.</div>
    </div>
    <div class="field">
      <div class="field-label">Mot de passe</div>
      <input class="input error" type="password" value="••••">
      <div class="helper error">Au moins 8 caractères.</div>
    </div>
    <div class="field">
      <div class="field-label">Année</div>
      <select class="input"><option>DFASM2</option><option>DFASM3</option></select>
    </div>
  </div>
  <div class="row" style="gap:14px">
    <div class="field" style="flex:2">
      <div class="field-label">Note</div>
      <textarea class="input" style="height:54px;padding:8px 10px;resize:none">L'IRM cérébrale est l'examen de référence pour le diagnostic d'AVC ischémique en phase aiguë.</textarea>
    </div>
  </div>
</body></html>
