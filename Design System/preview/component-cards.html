<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
.card { background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:var(--radius-md); padding:16px; transition:border-color var(--dur-sm) var(--ease-out), box-shadow var(--dur-sm) var(--ease-out); display:flex; flex-direction:column; gap:8px; }
.card.hover { border-color:var(--border-default); box-shadow:var(--shadow-sm); }
.card.selected { border-color:var(--accent); background:var(--bg-selected); box-shadow:inset 3px 0 0 var(--accent); }
</style>
</head>
<body class="preview-card">
  <div class="row" style="gap:14px;align-items:stretch">
    <div class="card" style="flex:1">
      <div style="font-size:13px;font-weight:600">Repos</div>
      <div style="font-size:12px;color:var(--fg-3);line-height:1.5">Item 334 — Syndrome coronarien aigu</div>
      <div class="meta" style="margin-top:auto">12 cartes · révisée il y a 3 j</div>
    </div>
    <div class="card hover" style="flex:1">
      <div style="font-size:13px;font-weight:600">Hover</div>
      <div style="font-size:12px;color:var(--fg-3);line-height:1.5">Item 232 — Diabète sucré</div>
      <div class="meta" style="margin-top:auto">28 cartes · 3 en retard</div>
    </div>
    <div class="card selected" style="flex:1">
      <div style="font-size:13px;font-weight:600">Sélectionné</div>
      <div style="font-size:12px;color:var(--fg-2);line-height:1.5">Item 102 — Sclérose en plaques</div>
      <div class="meta" style="margin-top:auto">45 cartes · à jour</div>
    </div>
  </div>
</body></html>
